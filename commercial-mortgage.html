  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-H5CN2GK1RQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-H5CN2GK1RQ');
  </script>
  <!-- GA4 lead-event tracking (phone / whatsapp / apply / contact / form) -->
  <script>
    (function(){
      function fire(name, params){ if (typeof gtag==='function'){ gtag('event', name, params||{}); } }
      document.addEventListener('click', function(e){
        var a = e.target && e.target.closest && e.target.closest('a');
        if(!a) return;
        var href = (a.getAttribute('href')||'').toLowerCase();
        if(href.indexOf('tel:')===0){ fire('phone_click',{link_url:href}); }
        else if(href.indexOf('wa.me')>-1 || href.indexOf('api.whatsapp')>-1){ fire('whatsapp_click',{link_url:href}); }
        else if(href.indexOf('apply')>-1){ fire('apply_click',{link_url:href}); }
        else if(href.indexOf('contact')>-1){ fire('contact_click',{link_url:href}); }
      }, true);
      document.addEventListener('submit', function(e){
        var id = (e.target && e.target.id) || '';
        fire('form_submit',{form_id:id});
      }, true);
    })();
  </script>
